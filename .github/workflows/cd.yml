name: CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          file:      ./backend/Dockerfile.prod
          platforms: linux/arm64
          push:      true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scanrate-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scanrate-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/scanrate-backend:latest
          cache-to:   type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend
          file:      ./frontend/Dockerfile.prod
          platforms: linux/arm64
          push:      true
          build-args: |
            VITE_API_URL=https://scanrate.pp.ua/api
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/scanrate-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/scanrate-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/scanrate-frontend:latest
          cache-to:   type=inline

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/scanrate
            
            # Pull latest GitHub repository changes
            git fetch
            git pull

            # Pull latest images
            sudo docker compose -f docker-compose.prod.yml pull

            # Restart containers
            sudo docker compose -f docker-compose.prod.yml up -d

            # Clean up old images to save disk space
            sudo docker image prune -f
