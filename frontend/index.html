<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Product Rater" />
    <meta name="description" content="ScanRate - відскануй та оціни продукт" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ScanRate</title>
    <style>
      /* Prevent the soft keyboard from resizing/shifting fixed-position layout.
         Each page's wrapper div handles its own scrolling via overflowY: auto. */
      html {
        height: 100%;
        overflow: hidden;
      }
      body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
