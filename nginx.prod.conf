server {
    listen 80;
    server_name scanrate.pp.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name grafana.scanrate.pp.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name scanrate.pp.ua;

    ssl_certificate     /etc/letsencrypt/live/scanrate.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scanrate.pp.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    client_max_body_size 10M;

    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass       http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass   http://backend:8000/uploads/;
        expires      30d;
        add_header   Cache-Control "public";
    }
}

server {
    listen 443 ssl;
    server_name grafana.scanrate.pp.ua;

    ssl_certificate     /etc/letsencrypt/live/grafana.scanrate.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.scanrate.pp.ua/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass       http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}